<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#161c24">
<!-- run full-screen from the iOS / Android home screen with the app's own dark background behind the status bar -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="T3dkky">
<title>Mölkky Scorekeeper</title>
<style>
  :root{
    --bg:#161c24; --bg2:#1d2530; --card:#232d39; --card2:#2b3645;
    --line:#374556; --ink:#eef3f8; --muted:#9fb0c2; --faint:#6c7d90;
    --wood:#d9a35b; --wood-dark:#b07c34; --wood-ink:#3a2a12;
    --good:#4cc38a; --bad:#f06c6c; --warn:#f0b34c; --accent:#5b9ff0;
    --r:14px; --shadow:0 6px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#22303f,var(--bg));
    color:var(--ink); min-height:100dvh; line-height:1.45;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:820px;margin:0 auto;padding:18px 16px 40px}
  /* full-height, no-scroll layout while a game is in progress */
  body.play{height:100dvh;overflow:hidden}
  body.play .wrap{height:100%;max-width:600px;display:flex;flex-direction:column;padding:10px 12px;gap:9px}
  body.play header.top{margin-bottom:0;flex:0 0 auto}
  body.play #game{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;gap:9px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px}
  .pin{
    width:34px;height:42px;border-radius:5px 5px 4px 4px;
    background:linear-gradient(180deg,#f0c98a,var(--wood) 55%,var(--wood-dark));
    box-shadow:inset 0 -6px 10px rgba(0,0,0,.18), var(--shadow);
    display:flex;align-items:flex-end;justify-content:center;
    position:relative;flex:0 0 auto;
  }
  .pin::before{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    border-left:17px solid transparent;border-right:17px solid transparent;border-bottom:9px solid #f0c98a}
  .pin b{font-size:13px;color:var(--wood-ink);font-weight:800;margin-bottom:4px}
  h1{font-size:20px;margin:0;letter-spacing:.3px}
  h1 small{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .btn{
    font:inherit;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:10px 14px;border-radius:11px;cursor:pointer;transition:.12s;display:inline-flex;
    align-items:center;gap:7px;justify-content:center
  }
  .btn:hover{background:var(--card2)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
  .btn.primary{background:linear-gradient(180deg,var(--wood),var(--wood-dark));border-color:var(--wood-dark);color:var(--wood-ink);font-weight:800}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:0 0 10px}

  /* ---------- Setup ---------- */
  #setup .card{padding:18px}
  .pl-row{display:flex;gap:8px;align-items:center;margin-bottom:9px}
  .pl-row .grip{color:var(--faint);font-size:18px;cursor:grab;user-select:none;width:18px;text-align:center}
  .pl-row input{
    flex:1;font:inherit;background:var(--bg2);border:1px solid var(--line);color:var(--ink);
    padding:11px 13px;border-radius:10px;min-width:0
  }
  .pl-row input:focus{outline:none;border-color:var(--wood)}
  .pl-row .num{width:24px;text-align:center;color:var(--faint);font-weight:700}
  .x{background:transparent;border:none;color:var(--faint);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px}
  .x:hover{color:var(--bad);background:rgba(240,108,108,.1)}
  .setup-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .setup-actions .primary{flex:1;min-width:160px;font-size:16px;padding:13px}
  .hint{color:var(--muted);font-size:13px;margin:14px 2px 0}
  .opt{display:flex;align-items:center;gap:14px;padding:11px 0;cursor:pointer}
  .opt + .opt{border-top:1px solid var(--line)}
  .opt-txt{flex:1}
  .opt-txt b{display:block;font-size:15px;font-weight:700}
  .opt-txt small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
  .switch{position:relative;flex:0 0 auto;width:50px;height:30px}
  .switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;z-index:1}
  .switch .track{position:absolute;inset:0;background:var(--line);border-radius:30px;transition:.18s}
  .switch .track::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:#f4f7fa;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .switch input:checked + .track{background:var(--good)}
  .switch input:checked + .track::after{transform:translateX(20px)}

  /* ---------- Turn strip (current player) ---------- */
  .turn{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:15px;
    background:linear-gradient(180deg, rgba(217,163,91,.26), rgba(217,163,91,.05)), var(--card);
    border:2px solid var(--wood);box-shadow:0 0 18px rgba(217,163,91,.18), var(--shadow)}
  .turn.flash{animation:turnflash .55s cubic-bezier(.2,.9,.3,1)}
  @keyframes turnflash{
    0%{transform:scale(.97);box-shadow:0 0 0 0 rgba(217,163,91,.6)}
    40%{transform:scale(1.012);box-shadow:0 0 30px 4px rgba(217,163,91,.55)}
    100%{transform:scale(1);box-shadow:0 0 18px rgba(217,163,91,.18), var(--shadow)}
  }
  .turn .av{flex:0 0 auto;width:46px;height:46px;border-radius:50%;background:var(--wood);color:var(--wood-ink);
    font-weight:800;font-size:20px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 4px rgba(217,163,91,.22)}
  .turn .who{flex:1;min-width:0}
  .turn .kicker{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--wood);margin-bottom:1px}
  .turn .kicker .live{width:8px;height:8px;border-radius:50%;background:var(--wood);
    box-shadow:0 0 6px var(--wood);animation:livepulse 1.1s ease-in-out infinite}
  @keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
  .turn .who .nm{font-size:24px;font-weight:800;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .turn .who .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .turn .need{flex:0 0 auto;text-align:right;line-height:1}
  .turn .need .big{font-size:30px;font-weight:800;color:var(--wood);line-height:1;font-variant-numeric:tabular-nums}
  .turn .need .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

  /* ---------- Scoreboard (auto-fit, no scroll) ---------- */
  .scoreboard{flex:1 1 auto;min-height:0;display:grid;gap:7px}
  .pc{position:relative;display:flex;align-items:center;gap:9px;padding:6px 11px;border-radius:11px;
    background:var(--card);border:1px solid var(--line);overflow:hidden;min-height:0;min-width:0}
  .pc.active{border-color:var(--wood);background:linear-gradient(180deg,#2f3e4d,var(--card));
    box-shadow:0 0 0 2px rgba(217,163,91,.3)}
  .pc.elim{opacity:.45}
  .pc.elim .sc{text-decoration:line-through}
  .pc .rk{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:var(--bg2);color:var(--muted);
    font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .pc.active .rk{background:var(--wood);color:var(--wood-ink)}
  .pc .nm{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .pc .nm .n{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pc .nm .sub{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted);white-space:nowrap}
  .pc .dots{display:flex;gap:3px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--bad)}
  .pc .sc{flex:0 0 auto;font-size:clamp(20px,6vh,30px);font-weight:800;line-height:1;
    font-variant-numeric:tabular-nums;letter-spacing:-1px}
  .pc .sc i{font-size:11px;color:var(--faint);font-style:normal;font-weight:600}
  .pc .bar{position:absolute;left:0;bottom:0;height:3px;background:var(--wood);transition:width .3s}

  /* ---------- Score pad ---------- */
  .pad{flex:0 0 auto;padding:10px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .num-btn{
    font:inherit;font-weight:800;font-size:21px;min-height:50px;padding:5px 0;border-radius:10px;cursor:pointer;
    border:1px solid var(--wood-dark);color:var(--wood-ink);display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#f0c98a,var(--wood) 60%,var(--wood-dark));
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.15);transition:.1s;position:relative
  }
  .num-btn:hover{filter:brightness(1.06)}
  .num-btn:active{transform:translateY(2px);box-shadow:inset 0 -1px 4px rgba(0,0,0,.2)}
  .pad-actions{display:flex;gap:8px;margin-top:9px}
  .pad-actions .miss{flex:2;background:linear-gradient(180deg,#ff4d4d,#e01e1e);border-color:#b01414;color:#fff;font-weight:800;font-size:15px;padding:12px;box-shadow:0 2px 8px rgba(224,30,30,.35)}
  .pad-actions .miss:hover{background:linear-gradient(180deg,#ff6060,#f02323)}
  .pad-actions .undo{flex:1;background:linear-gradient(180deg,#ffe14d,#f5c518);border-color:#c79a00;color:#3a2e00;font-weight:800;font-size:14px;padding:12px;box-shadow:0 2px 8px rgba(245,197,24,.32)}
  .pad-actions .undo:hover{background:linear-gradient(180deg,#fff066,#ffd02b)}
  .pad-actions .undo:disabled{opacity:.35}

  /* ---------- Game over ---------- */
  #over{text-align:center}
  .trophy{font-size:54px;margin:6px 0}
  .winner-name{font-size:30px;font-weight:800;color:var(--wood);margin:2px 0 4px}
  .standings{margin:20px auto 0;max-width:460px;text-align:left}
  .st-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;background:var(--card);border:1px solid var(--line);margin-bottom:8px}
  .st-row .rk{width:26px;height:26px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:0 0 auto}
  .st-row.gold .rk{background:var(--wood);color:var(--wood-ink)}
  .st-row .sn{flex:1;font-weight:700}
  .st-row .ss{font-weight:800;font-size:20px;font-variant-numeric:tabular-nums}
  .st-row .sub{font-size:11px;color:var(--muted);font-weight:500}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120%);
    background:var(--card2);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:12px;
    box-shadow:var(--shadow);font-weight:600;font-size:14px;transition:transform .3s;z-index:50;max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.bad{border-color:var(--bad);color:#ffc2c2}
  .toast.good{border-color:var(--good);color:#bff0d8}

  details.rules{margin-top:22px}
  details.rules summary{cursor:pointer;color:var(--muted);font-size:13px;list-style:none;padding:8px 0}
  details.rules summary::-webkit-details-marker{display:none}
  details.rules .body{font-size:13px;color:var(--muted);background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;margin-top:6px}
  details.rules .body li{margin-bottom:6px}
  .hidden{display:none!important}
  .footer{text-align:center;color:var(--faint);font-size:11px;margin-top:26px}
  body.play .footer{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="pin"><b>12</b></div>
      <h1>Mölkky <small>Scorekeeper</small></h1>
    </div>
    <button class="btn ghost sm" id="newGameBtn">New game</button>
  </header>

  <!-- ===================== SETUP ===================== -->
  <section id="setup" class="hidden">
    <div class="card">
      <p class="section-title">Players</p>
      <div id="plList"></div>
      <button class="btn sm ghost" id="addPlayer" style="margin-top:6px">＋ Add player</button>
    </div>

    <div class="card" style="padding:18px;margin-top:14px">
      <p class="section-title">Rules</p>
      <label class="opt" for="optFun">
        <span class="opt-txt">
          <b>Fun Mode</b>
          <small>Going over 50 doesn't reset you to 25. First to reach 50+ wins.</small>
        </span>
        <span class="switch"><input type="checkbox" id="optFun"><span class="track"></span></span>
      </label>
      <label class="opt" for="optElim">
        <span class="opt-txt">
          <b>Strike-out on 3 misses</b>
          <small>Miss every pin three turns in a row and you're eliminated.</small>
        </span>
        <span class="switch"><input type="checkbox" id="optElim"><span class="track"></span></span>
      </label>
    </div>

    <div class="setup-actions">
      <button class="btn primary" id="startBtn">Start game →</button>
    </div>
    <p class="hint" id="setupHint"></p>
  </section>

  <!-- ===================== PLAYING ===================== -->
  <section id="game" class="hidden">
    <div class="turn" id="turnStrip">
      <div class="av" id="curAv">1</div>
      <div class="who">
        <div class="kicker"><span class="live"></span>Now throwing</div>
        <div class="nm" id="curName">—</div>
        <div class="sub" id="curSub"></div>
      </div>
      <div class="need">
        <div class="big" id="curNeed">50</div>
        <div class="lbl">to go</div>
      </div>
    </div>

    <div class="scoreboard" id="board"></div>

    <div class="card pad">
      <div class="grid" id="numGrid"></div>
      <div class="pad-actions">
        <button class="btn miss" id="missBtn">Missed — 0</button>
        <button class="btn undo" id="undoBtn">↶ Undo</button>
      </div>
    </div>
  </section>

  <!-- ===================== GAME OVER ===================== -->
  <section id="over" class="hidden">
    <div class="card" style="padding:26px 20px">
      <div class="trophy">🏆</div>
      <div class="section-title" style="text-align:center">Winner</div>
      <div class="winner-name" id="winName">—</div>
      <div class="standings" id="standings"></div>
      <div class="setup-actions" style="justify-content:center">
        <button class="btn primary" id="rematchBtn" style="flex:0 0 auto;padding:13px 26px">Rematch · same players ↺</button>
        <button class="btn ghost" id="editPlayersBtn" style="flex:0 0 auto">Edit players</button>
      </div>
    </div>
  </section>

  <p class="footer">Mölkky · first to exactly 50</p>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const TARGET = 50, OVER_RESET = 25, MISS_LIMIT = 3;
const KEY = "molkky-state-v1";
const $ = s => document.querySelector(s);

let S = load() || freshSetup();
let lastShownTurn = -1;
let prevPhase = S.phase;   // so reloading a finished game doesn't auto-fire confetti

function defaultOptions(){ return { funMode:false, elimination:true }; }
function freshSetup(){
  return { phase:"setup", names:["Player 1","Player 2"], players:[], current:0, history:[], winner:null, options:defaultOptions() };
}

/* ---------------- persistence ---------------- */
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }

/* ---------------- setup screen ---------------- */
function renderSetup(){
  const list = $("#plList");
  list.innerHTML = "";
  S.names.forEach((nm,i)=>{
    const row = document.createElement("div");
    row.className = "pl-row";
    row.innerHTML = `<span class="num">${i+1}</span>
      <input type="text" value="" placeholder="Player ${i+1}" maxlength="24">
      <button class="x" title="Remove" aria-label="Remove">×</button>`;
    const input = row.querySelector("input");
    input.value = nm;
    input.addEventListener("input", e => S.names[i] = e.target.value);
    row.querySelector(".x").addEventListener("click", ()=>{
      if(S.names.length <= 1){ toast("Need at least one player"); return; }
      S.names.splice(i,1); renderSetup();
    });
    list.appendChild(row);
  });
  if(!S.options) S.options = defaultOptions();
  $("#optFun").checked = S.options.funMode;
  $("#optElim").checked = S.options.elimination;
  updateSetupHint();
  $("#startBtn").disabled = false;
}

function updateSetupHint(){
  const o = S.options || defaultOptions();
  const win = o.funMode ? "First to <b>50 or more</b> wins — no penalty for overshooting." : "First to <b>exactly 50</b> wins; go over and you drop to <b>25</b>.";
  const strike = o.elimination ? " Miss everything three turns running and you're out." : " No strike-outs — keep throwing all game.";
  $("#setupHint").innerHTML = win + strike;
}

function startGame(){
  const names = S.names.map((n,i)=> (n||"").trim() || `Player ${i+1}`);
  if(names.length < 1){ toast("Add a player first"); return; }
  S.players = names.map(n => ({ name:n, score:0, miss:0, throws:[], eliminated:false }));
  S.names = names;
  S.current = 0;
  S.history = [];
  S.winner = null;
  S.phase = "playing";
  save(); render();
}

/* ---------------- game logic ---------------- */
function activeIdxs(){ return S.players.map((p,i)=>i).filter(i=>!S.players[i].eliminated); }

function snapshot(){
  // full history kept so Undo can walk all the way back to the first throw
  S.history.push(JSON.stringify({ players:S.players, current:S.current, winner:S.winner, phase:S.phase }));
}

function nextTurn(){
  const act = activeIdxs();
  if(act.length === 0) return;
  let i = S.current;
  for(let k=0;k<S.players.length;k++){
    i = (i+1) % S.players.length;
    if(!S.players[i].eliminated){ S.current = i; return; }
  }
}

function applyThrow(points){
  if(S.phase !== "playing") return;
  const p = S.players[S.current];
  if(!p || p.eliminated) return;
  snapshot();

  const opt = S.options || defaultOptions();

  if(points === 0){
    p.throws.push(0);
    if(opt.elimination){
      p.miss += 1;
      if(p.miss >= MISS_LIMIT){
        p.eliminated = true;
        toast(`${p.name} eliminated — 3 misses`, "bad");
      }
    }
  } else {
    p.miss = 0;
    p.throws.push(points);
    const total = p.score + points;
    const wins = opt.funMode ? (total >= TARGET) : (total === TARGET);
    if(wins){
      p.score = total;
      S.winner = S.current;
      S.phase = "over";
      save(); render();
      return;
    } else if(!opt.funMode && total > TARGET){
      p.score = OVER_RESET;
      toast(`${p.name} went over 50 → back to 25`, "bad");
    } else {
      p.score = total;
    }
  }

  // last-player-standing
  const act = activeIdxs();
  if(act.length === 1 && S.players.length > 1){
    S.winner = act[0];
    S.phase = "over";
    save(); render();
    return;
  }
  if(act.length === 0){ // everyone out (solo edge); end gracefully
    S.phase = "over"; S.winner = null; save(); render(); return;
  }

  nextTurn();
  save(); render();
}

function undo(){
  if(!S.history.length){ toast("Nothing to undo"); return; }
  const prev = JSON.parse(S.history.pop());
  S.players = prev.players; S.current = prev.current; S.winner = prev.winner; S.phase = prev.phase;
  save(); render();
}

/* ---------------- game render ---------------- */
function renderBoard(){
  const board = $("#board");
  const opt = S.options || defaultOptions();
  const n = S.players.length;
  const cols = n > 5 ? 2 : 1;            // 1 column up to 5 players, 2 columns for 6–10
  const rows = Math.ceil(n / cols);
  board.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  board.style.gridTemplateRows = `repeat(${rows},minmax(0,1fr))`;
  board.innerHTML = "";
  S.players.forEach((p,i)=>{
    const active = (i===S.current && S.phase==="playing");
    const el = document.createElement("div");
    el.className = "pc" + (active?" active":"") + (p.eliminated?" elim":"");
    const dots = opt.elimination
      ? `<span class="dots">${Array.from({length:MISS_LIMIT},(_,d)=>`<span class="dot ${d<p.miss?'on':''}"></span>`).join("")}</span>`
      : "";
    const status = p.eliminated ? `<span style="color:var(--bad)">out</span>` : `<span>${Math.max(0,TARGET-p.score)} to go</span>`;
    const pct = Math.min(100, Math.max(0, p.score)/TARGET*100);
    el.innerHTML = `
      <span class="rk">${i+1}</span>
      <span class="nm">
        <span class="n">${escapeHtml(p.name)}</span>
        <span class="sub">${status}${dots}</span>
      </span>
      <span class="sc">${p.score}<i>/${TARGET}</i></span>
      <span class="bar" style="width:${pct}%"></span>`;
    board.appendChild(el);
  });
}

function renderGame(){
  renderBoard();
  const p = S.players[S.current];
  const opt = S.options || defaultOptions();
  if(p){
    $("#curAv").textContent = S.current + 1;
    $("#curName").textContent = p.name;
    $("#curNeed").textContent = Math.max(0, TARGET - p.score);
    const sub = opt.elimination
      ? `On ${p.score} · ${MISS_LIMIT - p.miss} miss${MISS_LIMIT-p.miss===1?"":"es"} left`
      : `On ${p.score}`;
    $("#curSub").textContent = sub;
    // re-trigger the highlight whenever the active player changes
    if(S.current !== lastShownTurn){
      const ts = $("#turnStrip");
      ts.classList.remove("flash"); void ts.offsetWidth; ts.classList.add("flash");
      lastShownTurn = S.current;
    }
  }
  renderPad();
  $("#undoBtn").disabled = S.history.length === 0;
}

function renderPad(){
  const grid = $("#numGrid");
  grid.innerHTML = "";
  for(let n=1;n<=12;n++){
    const b = document.createElement("button");
    b.className = "num-btn";
    b.textContent = n;
    b.addEventListener("click", ()=> applyThrow(n));
    grid.appendChild(b);
  }
}

/* ---------------- game over ---------------- */
function renderOver(){
  const winner = S.winner!=null ? S.players[S.winner] : null;
  $("#winName").textContent = winner ? winner.name : "No winner";
  const order = S.players.map((p,i)=>({p,i})).sort((a,b)=>{
    if(a.i===S.winner) return -1; if(b.i===S.winner) return 1;
    if(a.p.eliminated !== b.p.eliminated) return a.p.eliminated?1:-1;
    return b.p.score - a.p.score;
  });
  const wrap = $("#standings");
  wrap.innerHTML = "";
  order.forEach((o,rank)=>{
    const r = document.createElement("div");
    r.className = "st-row" + (o.i===S.winner ? " gold":"");
    const throwsCount = o.p.throws.length;
    r.innerHTML = `<div class="rk">${rank+1}</div>
      <div class="sn">${escapeHtml(o.p.name)} ${o.p.eliminated?'<span class="sub">· eliminated</span>':''}
        <div class="sub">${throwsCount} throw${throwsCount===1?"":"s"}</div></div>
      <div class="ss">${o.p.score}</div>`;
    wrap.appendChild(r);
  });
}

/* ---------------- top-level render ---------------- */
function render(){
  document.body.classList.toggle("play", S.phase==="playing");
  $("#setup").classList.toggle("hidden", S.phase!=="setup");
  $("#game").classList.toggle("hidden", S.phase!=="playing");
  $("#over").classList.toggle("hidden", S.phase!=="over");
  if(S.phase==="setup") renderSetup();
  else if(S.phase==="playing") renderGame();
  else if(S.phase==="over") renderOver();
  if(S.phase==="over" && prevPhase!=="over" && S.winner!=null) launchConfetti();
  prevPhase = S.phase;
}

/* ---------------- confetti ---------------- */
function launchConfetti(){
  const old = document.getElementById("confetti");
  if(old) old.remove();
  const c = document.createElement("canvas");
  c.id = "confetti";
  c.style.cssText = "position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:80";
  document.body.appendChild(c);
  const ctx = c.getContext("2d");
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  const W = () => window.innerWidth, H = () => window.innerHeight;
  function size(){ c.width = W()*dpr; c.height = H()*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
  size();
  window.addEventListener("resize", size);
  const colors = ["#d9a35b","#f0c98a","#4cc38a","#5b9ff0","#f06c6c","#f0b34c","#ffffff"];
  const parts = [];
  const DURATION = 4500;            // keep streaming new confetti for this long
  const start = performance.now();
  function spawn(n){
    for(let i=0;i<n;i++){
      parts.push({
        x: Math.random()*W(), y: -20 - Math.random()*60,
        vx: (Math.random()-0.5)*1.4, vy: 2 + Math.random()*3.5,
        size: 6 + Math.random()*7, rot: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.3,
        color: colors[(Math.random()*colors.length)|0], shape: Math.random()<0.5?0:1,
        sway: Math.random()*Math.PI*2, swaySpeed: 0.02 + Math.random()*0.03
      });
    }
  }
  function frame(now){
    ctx.clearRect(0,0,W(),H());
    if(now - start < DURATION) spawn(5);
    for(let i=parts.length-1;i>=0;i--){
      const p = parts[i];
      p.sway += p.swaySpeed;
      p.x += p.vx + Math.sin(p.sway)*0.9;
      p.y += p.vy; p.vy += 0.015; p.rot += p.vr;
      if(p.y > H()+25){ parts.splice(i,1); continue; }
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape===0) ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.66);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    if(now - start < DURATION || parts.length){ requestAnimationFrame(frame); }
    else { window.removeEventListener("resize", size); c.remove(); }
  }
  requestAnimationFrame(frame);
}

/* ---------------- helpers ---------------- */
let toastT;
function toast(msg, kind=""){
  const t = $("#toast");
  t.textContent = msg; t.className = "toast show " + kind;
  clearTimeout(toastT);
  toastT = setTimeout(()=> t.className = "toast " + kind, 2400);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- wiring ---------------- */
$("#addPlayer").addEventListener("click", ()=>{
  if(S.names.length >= 16){ toast("That's plenty of players"); return; }
  S.names.push(`Player ${S.names.length+1}`); renderSetup();
});
$("#startBtn").addEventListener("click", startGame);
$("#optFun").addEventListener("change", e=>{ S.options.funMode = e.target.checked; updateSetupHint(); save(); });
$("#optElim").addEventListener("change", e=>{ S.options.elimination = e.target.checked; updateSetupHint(); save(); });
$("#missBtn").addEventListener("click", ()=> applyThrow(0));
$("#undoBtn").addEventListener("click", undo);
$("#newGameBtn").addEventListener("click", ()=>{
  if(S.phase==="playing" && !confirm("Start a new game? Current scores will be lost.")) return;
  S = freshSetup();
  // keep last roster as a convenience if we have one
  const last = load();
  if(last && last.players && last.players.length) S.names = last.players.map(p=>p.name);
  if(last && last.options) S.options = last.options;
  S.phase = "setup"; save(); render();
});
$("#rematchBtn").addEventListener("click", ()=>{
  // same players, fresh game — rotate the throwing order so a new person leads off
  const names = S.players.map(p=>p.name);
  names.push(names.shift());
  S.players = names.map(n=>({name:n,score:0,miss:0,throws:[],eliminated:false}));
  S.current = 0; S.history = []; S.winner = null; S.phase = "playing";
  lastShownTurn = -1;
  save(); render();
});
$("#editPlayersBtn").addEventListener("click", ()=>{
  S.names = S.players.map(p=>p.name);
  S.phase = "setup"; save(); render();
});

// boot
if(!S.phase) S = freshSetup();
if(!S.options) S.options = defaultOptions();
if(S.phase==="setup" && (!S.names || !S.names.length)) S.names = ["Player 1","Player 2"];
render();
</script>
